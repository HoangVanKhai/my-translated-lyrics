language: en
words:
  # Vietnamese names not in dict-vi-vn
  - Nhụy
  - Thùy
  - Thủy
  # Vietnamese common words not in dict-vi-vn
  - khóa
  - nguôi
  - nhòa
  - thỏa
  - trỗi
  # Chinese pinyin and names
  - Feng
  - Tianyi
  - Touhou
  - Yuezheng
  # Brand and artist names
  - AXIDI
  - Dinstakovich
  - distantal
  - Sekinen
  - Vsinger
  - WOVOP
  # Technical terms
  - transciptor
  - WEBVTT
import:
  - '@cspell/dict-vi-vn/cspell-ext.json'
ignorePaths:
  - '**/video.toml'
  - 'drafts/**/*.js'
  - 'drafts/**/*.json'
  - 'trash/**'
overrides:
  - filename:
      - '**/*.vi.srt'
      - '**/*.vi.vtt'
      - '**/*.vi.*.srt'
      - '**/*.vi.*.vtt'
      - '**/*.vi.*.txt'
    language: en,vi
  - filename:
      - '**/*.zh.srt'
      - '**/*.zh.vtt'
      - '**/*.zh.txt'
      - '**/*.zh-*.srt'
      - '**/*.zh-*.vtt'
    language: en
  - filename:
      - '**/*.en.srt'
      - '**/*.en.vtt'
    language: en
