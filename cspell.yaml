import:
  - '@cspell/dict-vi-vn/cspell-ext.json'
ignorePaths:
  - '**/video.toml'
  - 'Cargo.lock'
  - 'Cargo.toml'
  - 'cspell.yaml'
  - 'drafts/**/*.js'
  - 'drafts/**/*.json'
  - 'sources/**/*.js'
  - 'sources/**/*.json'
  - 'LICENSE.md'
  - 'package.json'
  - 'pnpm-lock.yaml'
  - 'trash/**'
overrides:
  - filename:
      - '**/*.vi.srt'
      - '**/*.vi.vtt'
      - '**/*.vi.txt'
    language: en,vi
    words:
      - AXIDI
      - Dinstakovich
      - distantal
      - khóa
      - nguôi
      - nhòa
      - Nhụy
      - Sekinen
      - thỏa
      - Thùy
      - Thủy
      - Tianyi
      - trỗi
      - Vsinger
      - WOVOP
      - Yuezheng
  - filename:
      - '**/*.zh.srt'
      - '**/*.zh.vtt'
      - '**/*.zh.txt'
      - '**/*.zh-*.srt'
      - '**/*.zh-*.vtt'
    language: en,zh
    words:
      - AXIDI
      - distantal
      - Tianyi
      - Vsinger
      - WOVOP
      - Yuezheng
  - filename:
      - '**/*.en.srt'
      - '**/*.en.vtt'
    language: en
  - filename: '**/*.vtt'
    words:
      - WEBVTT
  - filename: '**/words.toml'
    language: en,vi
    words:
      - Biên
      - chiếu
      - chỉnh
      - Chính
      - Điều
      - Giang
      - giáo
      - giọng
      - Hình
      - hoạch
      - khúc
      - Lăng
      - liệu
      - nhạc
      - Nhạc
      - Nhất
      - Phối
      - Soạn
      - tham
      - Thiên
      - thoại
      - thuật
      - Tianyi
      - Trình
      - Trường
      - VSINGER
      - Vsinger
      - Viễn
      - Viết
      - xuất
      - Yuezheng
  - filename: '**/*.rs'
    words:
      - Chính
      - Feng
      - hardlink
      - Lăng
      - maplit
      - nhạc
      - Nhạc
      - rsplit
      - Soạn
      - Thiên
      - Tianyi
      - Touhou
      - Trình
      - WEBVTT
      - Yuezheng
  - filename: '**/*.md'
    words:
      - clippy
      - newtype
      - rustup
      - serde
      - usize
