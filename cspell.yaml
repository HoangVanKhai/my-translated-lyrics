language: en
words:
  - Feng
  - Touhou
import:
  - '@cspell/dict-vi-vn/cspell-ext.json'
ignorePaths:
  - 'cspell.yaml'
  - '**/video.toml'
  - 'drafts/**/*.js'
  - 'drafts/**/*.json'
  - 'trash/**'
overrides:
  - filename:
      - '**/*.vi.srt'
      - '**/*.vi.vtt'
      - '**/*.vi.*.srt'
      - '**/*.vi.*.vtt'
      - '**/*.vi.*.txt'
    language: en,vi
    words:
      - khóa
      - nguôi
      - nhòa
      - Nhụy
      - thỏa
      - Thùy
      - Thủy
      - trỗi
      - Dinstakovich
      - Sekinen
  - filename:
      - '**/*.zh.srt'
      - '**/*.zh.vtt'
      - '**/*.zh.txt'
      - '**/*.zh-*.srt'
      - '**/*.zh-*.vtt'
    language: en
  - filename:
      - '**/*.en.srt'
      - '**/*.en.vtt'
    language: en
  - filename:
      - '**/*.vi.srt'
      - '**/*.vi.vtt'
      - '**/*.vi.*.srt'
      - '**/*.vi.*.vtt'
      - '**/*.vi.*.txt'
      - '**/*.zh.srt'
      - '**/*.zh.vtt'
      - '**/*.zh.txt'
    words:
      - AXIDI
      - distantal
      - Tianyi
      - Vsinger
      - WOVOP
      - Yuezheng
  - filename: '**/*.vtt'
    words:
      - WEBVTT
  - filename: '**/texts.txt'
    words:
      - transciptor
