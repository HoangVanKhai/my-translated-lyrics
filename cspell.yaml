import:
  - '@cspell/dict-vi-vn/cspell-ext.json'
words:
  - dylint
ignorePaths:
  - '**/credits.yaml'
  - '**/line-markers.toml'
  - '**/video.toml'
  - 'Cargo.lock'
  - 'Cargo.toml'
  - 'cspell.yaml'
  - 'drafts/**/*.js'
  - 'drafts/**/*.json'
  - 'COPYRIGHT.md'
  - 'LICENSE.md'
  - 'package.json'
  - 'pnpm-lock.yaml'
  - 'trash/**'
overrides:
  - filename:
      - '**/*.vi.srt'
      - '**/*.vi.vtt'
      - '**/*.vi.txt'
    language: en,vi
    words:
      - AXIDI
      - Dinstakovich
      - distantal
      - Irecorder
      - khóa
      - khóe
      - nguôi
      - nhòa
      - Nhụy
      - Sekinen
      - thỏa
      - Thùy
      - Thủy
      - Tianyi
      - trỗi
      - Vsinger
      - WOVOP
      - Yuezheng
  - filename:
      - '**/*.zh.srt'
      - '**/*.zh.vtt'
      - '**/*.zh.txt'
      - '**/*.zh-*.srt'
      - '**/*.zh-*.vtt'
    language: en,zh
    words:
      - AXIDI
      - distantal
      - Irecorder
      - Tianyi
      - Vsinger
      - WOVOP
      - Yuezheng
  - filename:
      - '**/*.en.srt'
      - '**/*.en.vtt'
    language: en
  - filename: '**/*.vtt'
    words:
      - WEBVTT
  - filename: '**/*.rs'
    words:
      - btreemap
      - Feng
      - hardlink
      - maplit
      - rsplit
      - saphyr
      - Tianyi
      - Touhou
      - WEBVTT
      - Yuezheng
  - filename: '**/*.md'
    words:
      - clippy
      - combinators
      - newtype
      - rustup
      - serde
      - usize
