name: Dylint

on:
  - push
  - pull_request

jobs:
  dylint:
    name: Dylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache
        id: cache
        uses: actions/cache@v5
        timeout-minutes: 2
        continue-on-error: true
        with:
          path: |
            ~/.cargo
            ~/.dylint_drivers
            target
          key: ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('dylint.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('dylint.toml') }}-${{ hashFiles('**/Cargo.lock') }}
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('dylint.toml') }}-
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-

      - name: Install Rust
        shell: bash
        run: |
          installer=$(mktemp -d)/install-rustup
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > $installer
          bash $installer --default-toolchain $(cat rust-toolchain) -y

      - name: Install Dylint tooling
        shell: bash
        run: cargo install --locked cargo-dylint dylint-link

      # When the primary cache key did not match exactly, the cache was
      # either missed entirely or restored from one of the looser
      # `restore-keys` entries. The third entry ignores `dylint.toml`, so the
      # restored `target/dylint` library may have been built from a different
      # `dylint.toml`. `cargo dylint` does not always detect a changed `git`
      # `tag` and reuses the cached library as-is. Remove the dylint build
      # directory in this case so the library rebuilds from the in-tree
      # `dylint.toml`. On an exact cache hit the library matches the current
      # `dylint.toml` and the rebuild is skipped.
      - name: Invalidate stale dylint build artifacts
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: rm -rf target/dylint

      - name: Run Dylint
        shell: bash
        env:
          RUSTFLAGS: -D warnings
        run: cargo dylint --all --workspace -- --all-targets

      - name: Clean workspace artifacts before cache
        if: always()
        continue-on-error: true
        shell: bash
        run: cargo clean --workspace
