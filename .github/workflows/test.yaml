name: Test

# The test suite compiles the Rust workspace and reads the lyrics data
# directories, so it runs when Rust sources, cargo manifests, the toolchain
# pin, the AI instruction templates and their generated files, the lyrics
# data under sources/, dist/, and drafts/, or this workflow change. Edits to
# unrelated prose do not affect the build or the tests.
on:
  push:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - Cargo.lock
      - rust-toolchain
      - template/ai-instructions/**
      - CLAUDE.md
      - AGENTS.md
      - .github/copilot-instructions.md
      - sources/**
      - dist/**
      - drafts/**
      - .github/workflows/test.yaml
  pull_request:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - Cargo.lock
      - rust-toolchain
      - template/ai-instructions/**
      - CLAUDE.md
      - AGENTS.md
      - .github/copilot-instructions.md
      - sources/**
      - dist/**
      - drafts/**
      - .github/workflows/test.yaml

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache
        uses: actions/cache@v5
        timeout-minutes: 2
        continue-on-error: true
        with:
          path: |
            ~/.cargo
            target
          key: ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('**/Cargo.lock') }}
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-

      - name: Install Rust
        shell: bash
        run: |
          installer=$(mktemp -d)/install-rustup
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > $installer
          bash $installer --default-toolchain $(cat rust-toolchain) --component rustfmt,clippy -y

      - name: Fmt
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Clean workspace artifacts before cache
        if: always()
        continue-on-error: true
        shell: bash
        run: cargo clean --workspace
