[package]
name = "my-translated-lyrics"
version = "0.0.0"
edition = "2021"

[[bin]]
name = "install-local-lyrics"
path = "cli/install_local_lyrics.rs"

[[bin]]
name = "lyrics-ai-instructions"
path = "cli/ai_instructions.rs"
required-features = ["ai-instructions"]

[features]
ai-instructions = []

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
itertools = "0.14.0"
pipe-trait = "0.4.0"
reflink = "0.1.3"
