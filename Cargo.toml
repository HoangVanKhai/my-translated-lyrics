[package]
name = "my-translated-lyrics"
version = "0.0.0"
edition = "2024"

[[bin]]
name = "install-local-lyrics"
path = "cli/install_local_lyrics.rs"

[[bin]]
name = "lyrics-ai-instructions"
path = "cli/ai_instructions.rs"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
derive_more = { version = "2.1.1", features = ["as_ref", "deref", "display", "error", "into"] }
itertools = "0.14.0"
pipe-trait = "0.4.0"
reflink = "0.1.3"
serde = { version = "1.0.228", features = ["derive"] }
strum = { version = "0.28.0", features = ["derive"] }
toml = "1.1.2"

[dev-dependencies]
pretty_assertions = "1.4.1"
