[workspace.metadata.dylint]
libraries = [
  { git = "https://github.com/KSXGitHub/perfectionist", tag = "0.0.0-rc.17" },
]

[perfectionist]
enable = ["derive_ordering"]

# `FileType::is_file` and its sibling getters report cached metadata without
# observable side effects, so treat them as pure. This lets the
# `macro_argument_binding` rule accept calls such as
# `debug_assert!(file_type.is_file())` without demanding that the value be
# bound to a `let` first, which would needlessly force evaluation in release
# builds where `debug_assert!` expands to nothing.
["perfectionist::macro_argument_binding"]
extra_pure_methods = ["is_file"]

["perfectionist::derive_ordering"]
style = "prefix_then_alphabetical"
prefix = [
  "Debug", "Display", "Error",
  "Default",
  "Clone", "Copy",
  "PartialEq", "Eq", "PartialOrd", "Ord",
  "Hash",
  "AsRef", "AsMut", "Deref", "DerefMut",
  "From", "Into", "TryFrom", "TryInto", "FromStr",
  "IntoIterator",
  "Add", "AddAssign", "Sub", "SubAssign", "Mul", "MulAssign", "Div", "DivAssign",
  "BitOr", "BitOrAssign", "BitAnd", "BitAndAssign", "BitXor", "BitXorAssign",
  "Sum", "Product",
  "LowerHex", "UpperHex", "Octal",
]
