# Dylint configuration. The library list lives here (modern Dylint reads
# `[workspace.metadata.dylint]` from `dylint.toml`), alongside the
# per-rule configuration tables that the `perfectionist` library reads at
# load time.

[workspace.metadata.dylint]
libraries = [
  { git = "https://github.com/KSXGitHub/perfectionist", tag = "0.0.0-rc.17" },
]

# `derive_ordering` ships inactive by default, so it must be opted in
# explicitly. See the GitHub issue tracking a possible switch to the
# `alphabetical` style for the trade-off discussion.
[perfectionist]
enable = ["derive_ordering"]

# This repository already follows a semantic grouping for its derive
# lists rather than a strictly alphabetical one: the common standard
# derives are read first, then the comparison-trait quartet, then `Hash`,
# then the `derive_more` operator and conversion traits. The
# `prefix_then_alphabetical` style pins that grouping and alphabetises the
# remaining tail, which is where the crate's `serde`, `clap`, and `strum`
# derives land.
["perfectionist::derive_ordering"]
style = "prefix_then_alphabetical"
prefix = [
  "Debug", "Display", "Error",
  "Default",
  "Clone", "Copy",
  "PartialEq", "Eq", "PartialOrd", "Ord",
  "Hash",
  "AsRef", "AsMut", "Deref", "DerefMut",
  "From", "Into", "TryFrom", "TryInto", "FromStr",
  "IntoIterator",
  "Add", "AddAssign", "Sub", "SubAssign", "Mul", "MulAssign", "Div", "DivAssign",
  "BitOr", "BitOrAssign", "BitAnd", "BitAndAssign", "BitXor", "BitXorAssign",
  "Sum", "Product",
  "LowerHex", "UpperHex", "Octal",
]
